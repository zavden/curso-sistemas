services:
  api:
    image: alpine:latest
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c '
        echo "API started at $$(date +%T)"
        nc -z db 5432 2>/dev/null && echo "DB: connected" || echo "DB: connection FAILED"
        sleep 3600
      '

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: secret
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s
