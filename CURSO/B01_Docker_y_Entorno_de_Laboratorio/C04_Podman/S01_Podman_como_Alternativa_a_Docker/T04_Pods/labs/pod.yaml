apiVersion: v1
kind: Pod
metadata:
  name: lab-kube-pod
spec:
  containers:
    - name: web
      image: docker.io/library/nginx:latest
      ports:
        - containerPort: 80
          hostPort: 8888
    - name: sidecar
      image: docker.io/library/alpine:latest
      command: ["sleep", "3600"]
